apiVersion: v1
kind: Pod
metadata:
  name: jenkins-agent-k8s
  labels:
    app: jenkins-agent
spec:
  containers:
  - name: jnlp
    # This is the standard Jenkins agent communication container
    image: jenkins/inbound-agent:latest
    args: ['$(JENKINS_SECRET)', '$(JENKINS_NAME)']
  - name: build-tools
    # Using a lightweight image that includes both kubectl and helm
    image: dtzar/helm-kubectl:latest
    command:
    - cat
    tty: true
